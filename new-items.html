<!DOCTYPE html>
<html style = "background-color: #AAAAAA">
	<head id = "head">
		<style>
			ul {
  				list-style-type: none;
  				margin: 0;
  				padding: 0;
  				overflow: hidden;
  				background-color: #333;
			}

			li {
  				float: left;
			}

			li a {
  				display: block;
  				color: white;
  				text-align: center;
  				padding: 14px 16px;
  				text-decoration: none;
			}

			li a:hover {
  				background-color: #111;
			}
			body, html {
  				height: 100%;
			}
			
			.active {
 				background-color: #2C778F;
			}
			
			/* Centered text */
			.centered {
				position: absolute;
  				top: 30%;
  				left: 50%;
  				transform: translate(-50%, -50%);
			}
			
			.item {
				background-color: rgb(0, 0, 0);
			}
			
			.parallax {
	  			/*background-image: url('');*/

  				height: 30%; 

  				background-attachment: fixed;
  				background-position: center;
  				background-repeat: no-repeat;
  				background-size: cover;
			}

			#body {
				text-align: center;
			}

			.parent {
				background: url(item_pictures/blankpictures.png);
				background-size: 100% 750px;
				background-repeat: no-repeat;
				min-height: 750px;
				min-width: 100%;
				position: relative;
				display: inline-block;
			}

			.photo1{
				display: inline-block;
				position: absolute;
			}

			/*
			#rectcorners {
			  border-radius: 25px;
			  border: 2px solid #73AD21;
			  padding: 20px; 
			  width: 350px;
			  height: 600px; 
			}*/

		</style>
	</head>
	<body id = "body">
		<script src="https://www.gstatic.com/firebasejs/4.3.0/firebase.js"></script>
    	<script src="firebaseInit.js"></script>

		<ul>
  			<li><a href="/index.html">Home</a></li>
  			<li><a class="active" href="/new-items.html">New Items</a></li>
  			<li><a href="/new-form.html">Add An Item</a></li>
  			<li><a href="/my-items.html">My Items</a></li>
		</ul>

		<div class="parallax"> <div class="item"> <div class="centered"> <div style="font-size:60px">Mercatio</div></div></div></div>
		
		<div class = "item">
			<div style="background-color: rgb(255, 255, 255); font-size:36px">
				<script>
					var divs = 0;

					var link;

					function removeBoth(_idParent1, _idChild1, _idParent2, _idChild2){
						removeIt(_idParent1, _idChild1);
						removeIt(_idParent2, _idChild2);
					}

					function removeIt(_idParent, _idChild){
        				var parent = document.getElementById(_idParent);
        				var child = document.getElementById(_idChild);
        				parent.removeChild(child);
					}

					function changeIt(_src){
					    document.getElementById("body").innerHTML += "<div class = 'lightbox' style = 'position: fixed;' id = 'parent" + divs + "'><img id = 'childX' onclick=\"removeBoth('parent" + divs + "','child', 'parent" + divs + "','childX');\" style = 'top: 0%; left: 0%; position: absolute; width: 100%; height: 100%;' src = '/item_pictures/coolBackground.gif'><img id = 'child' style='left: 15%; width: 70%; height: auto; display: block; top-margin: auto; bottom-margin: auto; position: absolute;' src = '" + _src + "'/></div>";
					    divs ++;
					}

					var imageFolder = firebase.storage().ref('picFolder');

					var tradeRef = firebase.database().ref("trades");
					tradeRef.on('value', function(snapshot){
						snapshot.forEach(function(childSnapshot){
							var childData = childSnapshot.val();

							var photoRef = imageFolder.child(childData.title + '/have');

							photoRef.getDownloadURL().then(function(url) {
								var photoRefNeed = imageFolder.child(childData.title + '/need');
								photoRefNeed.getDownloadURL().then(function(needurl) {
										document.getElementById("body").innerHTML += "<div class = 'parent'><img onclick='changeIt(this.src)' style='left: 8.897%; top: 105px; width: 27.5%; height: 415px; float: left' src = '" + url + "' class = 'photo1'/><img onclick='changeIt(this.src)' style='position: absolute; right: 9.241%; top: 105px; width: 27.5%; height: 415px; float: right' src = '" + needurl + "' class = 'photo1'/><div style = 'position: absolute; right: 10%; top: 65%; color: rgb(200, 200, 200);'>Click To Enlarge</div><div style = 'position: absolute; left: 10%; top: 65%; color: rgb(200, 200, 200);'>Click To Enlarge</div><div>";
									}).catch(function(error) {

								  switch (error.code) {
								    case 'storage/object-not-found':
								      break;
								  }
								});
							}).catch(function(error) {

							  switch (error.code) {
							    case 'storage/object-not-found':
							      break;
							  }
							});
// left: 8.897%;

// right: 9.241%;
// top: 105px							
						});
					});
				</script>
			</div>
		</div>


	</body>
</html>
