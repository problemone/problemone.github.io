<!DOCTYPE html>
<html style = "background-color: #AAAAAA">
	<head>
		<style>
			ul {
  				list-style-type: none;
  				margin: 0;
  				padding: 0;
  				overflow: hidden;
  				background-color: #333;
			}

			li {
  				float: left;
			}

			li a {
  				display: block;
  				color: white;
  				text-align: center;
  				padding: 14px 16px;
  				text-decoration: none;
			}

			li a:hover {
  				background-color: #111;
			}
			body, html {
  				height: 100%;
			}
			
			.active {
 				background-color: #4CAF50;
			}
			
			/* Centered text */
			.centered {
				position: absolute;
  				top: 50%;
  				left: 50%;
  				transform: translate(-50%, -50%);
			}
			
			.item {
				background-color: rgb(0, 0, 0);
			}
			
			.parallax {
	  			/*background-image: url('');*/

  				height: 40%; 

  				background-attachment: fixed;
  				background-position: center;
  				background-repeat: no-repeat;
  				background-size: cover;
			}

			#body {
				text-align: center;
			}

			.photo1
			{
				position: relative;
				width: 40%;
				height: 40%;
				z-index: 2;
				vertical-align: sub;
			}

			.parent {
				overflow: hidden;
				background:url(item_pictures/blankpictures.png);
				background-size: 100% 100%;
				background-repeat: no-repeat;
				/*background-origin: content-box;*/
			}

			/*
			#rectcorners {
			  border-radius: 25px;
			  border: 2px solid #73AD21;
			  padding: 20px; 
			  width: 350px;
			  height: 600px; 
			}*/

		</style>
	</head>
	<body id = "body">
		<script src="https://www.gstatic.com/firebasejs/4.3.0/firebase.js"></script>
    	<script src="firebaseInit.js"></script>

		<ul>
  			<li><a href="/index.html">Home</a></li>
  			<li><a class="active" href="/new-items.html">New Items</a></li>
  			<li><a href="/new-form.html">Add An Item</a></li>
  			<li><a href="/my-items.html">My Items</a></li>
		</ul>

		<div class="parallax"> <div class="item"> <div class="centered"> <div style="font-size:60px">Mercatio</div></div></div></div>
		
		<div class = "item">
			<div style="background-color: rgb(255, 255, 255); font-size:36px">
				<script>
					var link;

					var imageFolder = firebase.storage().ref('picFolder');

					var tradeRef = firebase.database().ref("trades");
					tradeRef.on('value', function(snapshot){
						snapshot.forEach(function(childSnapshot){
							var photoRef = imageFolder.child(childSnapshot.name + 'have');

							photoRef.getDownloadURL().then(function(url) {
							  link = url;
							}).catch(function(error) {

							  switch (error.code) {
							    case 'storage/object-not-found':
							      break;
							  }
							});

							var childData = childSnapshot.val();
							document.getElementById("body").innerHTML += "<div class = 'parent'><div style='clear: both'><img style='float: left' src = '" + link + "' class = 'parent'/>" + childData.have + childData.need + "</div></div><br><br>";
						});
					});
				</script>
			</div>
		</div>

		<div class="parallax"></div>

	</body>
</html>
