<!DOCTYPE html>
<html>
	<head>
		<style>
			ul {
  				list-style-type: none;
  				margin: 0;
  				padding: 0;
  				overflow: hidden;
  				background-color: #333;
			}

			li {
  				float: left;
			}

			li a {
  				display: block;
  				color: white;
  				text-align: center;
  				padding: 14px 16px;
  				text-decoration: none;
			}

			li a:hover {
  				background-color: #111;
			}
			body, html {
  				height: 100%;
			}
			
			.active {
 				background-color: #2c778f;
			}
			
			/* Centered text */
			.centered {
				position: absolute;
  				top: 50%;
  				left: 50%;
  				transform: translate(-50%, -50%);
			}
			
			.text {
				background-color: rgba(0, 0, 0, 0.0000000000000000000000000000000000000000001);
			}
			
			.parallax {
  				/* The image used */
	  			background-image: url('https://www.richardcayne.com/wp-content/uploads/2015/03/stock-chart-blue.png');

  				/* Full height */
  				height: 100%; 

  				/* Create the parallax scrolling effect */
  				background-attachment: fixed;
  				background-position: center;
  				background-repeat: no-repeat;
  				background-size: cover;
			}
			.parallax2 {
  				/* The image used */
	  			background: url(https://cdn.pixabay.com/photo/2018/09/08/14/59/pencils-3662614_960_720.jpg) right bottom no-repeat, url(https://www.publicdomainpictures.net/pictures/90000/velka/pencil-erasers.jpg) left top repeat;

  				/* Full height */
  				height: 100%; 

  				/* Create the parallax scrolling effect */
  				background-attachment: fixed;
  				background-position: center;
  				background-repeat: no-repeat;
  				background-size: cover;
			}
		</style>
	</head>
	<body>

		</ul>
