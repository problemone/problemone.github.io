<!DOCTYPE html>
<html>
	<head>
		<style>
			.container {
  				position: relative;
  				text-align: center;
  				color: white;
			}
			
			.center {
  				padding: 70px 0;
  				border: 10px solid black;
  				text-align: center;
			}
			
			ul {
  				list-style-type: none;
  				margin: 0;
  				padding: 0;
  				overflow: hidden;
  				background-color: #333;
			}

			li {
  				float: left;
			}

			li a {
  				display: block;
  				color: white;
  				text-align: center;
  				padding: 14px 16px;
  				text-decoration: none;
			}

			li a:hover {
  				background-color: #111;
			}
			body, html {
  				height: 100%;
			}
			
			.active {
 				background-color: #2c778f;
			}
			
			/* Centered text */
			.centered {
				position: absolute;
  				top: 50.5%;
  				left: 50.5%;
  				transform: translate(-50%, -50%);
			}
			
			.centered2 {
				position: absolute;
  				top: 50%;
  				left: 50%;
  				transform: translate(-50%, -50%);
			}
			
			.text {
				background-color: rgba(0, 0, 0, 0.0000000000000000000000000000000000000000001);
			}
			
			.parHome {
  				/* The image used */
	  			background-image: url('https://www.publicdomainpictures.net/pictures/170000/velka/grunge-background-14635619239LT.jpg');

  				/* Full height */
  				height: 100%; 

  				/* Create the parallax scrolling effect */
  				background-attachment: fixed;
  				background-position: center;
  				background-repeat: no-repeat;
  				background-size: cover;
			}
			.parPencils {
  				/* The image used */
	  			background-image: url(https://cdn.pixabay.com/photo/2018/09/08/14/59/pencils-3662614_960_720.jpg);

  				/* Full height */
				height: 100%;
				width: 66%;

  				/* Create the parallax scrolling effect */
  				background-attachment: fixed;
  				background-position: right;
  				background-repeat: no-repeat;
  				background-size: cover;
			}
			.parErasers {
  				/* The image used */
	  			background-image:  url(https://www.publicdomainpictures.net/pictures/90000/velka/pencil-erasers.jpg);
  				
				/* Full height */
				height: 100%;
				width: 50%;

  				/* Create the parallax scrolling effect */
  				background-attachment: fixed;
  				background-position: left;
  				background-repeat: no-repeat;
  				background-size: cover;
			}
			.parNotebooks {
  				/* The image used */
	  			background-image:  url(https://www.publicdomainpictures.net/pictures/220000/velka/open-blank-notebook-black-amp-white.jpg);
  				
				/* Full height */
				height: 100%;
				width: 100%;

  				/* Create the parallax scrolling effect */
  				background-attachment: fixed;
  				background-position: left;
  				background-repeat: no-repeat;
  				background-size: cover;
			}

			/* Turn off parallax scrolling for tablets and phones. Increase the pixels if needed */
			@media only screen and (max-device-width: 1366px) {
  				.parHome {
    					background-attachment: scroll;
  				}
				.parNotebooks {
    					background-attachment: scroll;
  				}
				.parPencils {
    					background-attachment: scroll;
  				}
				.parErasers {
    					background-attachment: scroll;
  				}
			}
		</style>
	</head>
	<body style="margin:0;" onLoad="myFunction()">

		</ul>

		<div class="parHome">
			<div class="text">
				<div class="centered">
					<div style="font-size:60px; color:black;">
						Mercatio
					</div>
				</div>
				<div class="centered2">
					<div style="font-size:60px; color:white;">
						Mercatio
					</div>
				</div>
			</div>
		</div>
		
		<div style="height:125px;background-color:#000000;font-size:36px;color:white;"><center> <div class="middle">
			Mercatio was created by Nicholas and Robert. They designed an item exchange network for their high school, Khan Lab School. Trading items among students is now much easier.

			<div class="parPencils">
				<div class="parErasers">
				</div>
			</div>
		</div>

	</body>
</html>
