<!DOCTYPE html>
<html>

  <header>
    <h1>New Trade Request</h1>
    <br>
  </header>

  <body>

    <!-- The core Firebase JS SDK is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/4.3.0/firebase.js"></script>

    <!-- TODO: Add SDKs for Firebase products that you want to use
         https://firebase.google.com/docs/web/setup#config-web-app -->

    <script>
      // Your web app's Firebase configuration
      firebase.initializeApp({
        apiKey: "AIzaSyCxEO7YIUmoR9IFQJEjY0T1b-q0UzSlwfs",
        authDomain: "khan-change.firebaseapp.com",
        databaseURL: "https://khan-change.firebaseio.com",
        projectId: "khan-change",
        storageBucket: "khan-change.appspot.com",
        messagingSenderId: "636102143870",
        appId: "1:636102143870:web:84ac45a83c95eaa1"
      });

      function dataSaver(e) {
        e.preventDefault();

        var dbRef = firebase.database().ref("trades");

        var newDBRef = dbRef.push();

        newDBRef.set({
          message: document.forms["tradeForm"]["tradedescriptionbox"].value
        });

        console.log("successful " + document.forms["tradeForm"]["tradedescriptionbox"].value);
     
        document.getElementById("userForm").reset();
      }
    </script>

    <div class="alert alert-success success-message" style="display:none;">Your Trade Request Has Been Submitted</div>
    <form id="userForm" name="tradeForm"> 
      <div class="describe">
          <label for="tradedescription">Trade Description</label>
          <br>
          <br>
          <textarea name = "tradedescriptionbox" class="form-control message" id="tradedescription" placeholder="Enter Description" cols="30" rows="10" required></textarea>
      </div>
      <button type="submit" class="submitbutton">Submit</button>
    </form>

    <script>
      document.getElementById('userForm').addEventListener('submit', dataSaver);
    </script>

  </body>
</html>
